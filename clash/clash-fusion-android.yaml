# ============================================================
# Clash Meta for Android 配置
# 功能：多机场订阅整合 · 自动延迟优选 · 按需分流
# ============================================================

mode: rule

profile:
  store-selected: true  # 重启路由器后记住上次选择的节点

# ------------------------------------------------------------
# DNS
# ------------------------------------------------------------
dns:
  enable: true
  ipv6: false
  default-nameserver: [223.5.5.5, 119.29.29.29, 8.8.8.8]     # 用于解析 DoT/DoH 服务器域名，必须为直连 IP
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  respect-rules: true                                         # DNS 查询遵循代理规则，防止泄露
  proxy-server-nameserver: [223.5.5.5, 119.29.29.29]          # 解析代理服务器地址，走国内 DNS 降低握手延迟
  nameserver: [223.5.5.5, 119.29.29.29]                       # 国内域名解析
  fallback: ['https://doh.dns.sb/dns-query', 'https://dns.cloudflare.com/dns-query', 'https://dns.twnic.tw/dns-query', 'tls://8.8.4.4:853', tls://1.1.1.1, tls://8.8.8.8]  # 境外加密 DNS，用于被污染域名
  fallback-filter: {geoip: true, geoip-code: CN, geosite: [gfw], ipcidr: [240.0.0.0/4, 0.0.0.0/32], domain: [+.google.com, +.facebook.com, +.youtube.com]}
  fake-ip-filter: ["*.lan", "*.localdomain", "*.localhost", "*.local", "time.*.com", "time.*.gov", "ntp.*.com", "*.ntp.org.cn", "+.music.163.com", "+.126.net"]  # 这些域名返回真实 IP，不走 Fake-IP

# ------------------------------------------------------------
# 1. 机场订阅源
# ------------------------------------------------------------
proxy-providers:
  dogess:
    type: http
    path: ./proxy_providers/dogess.yaml # 主订阅源文件名, 推荐使用订阅商名
    url: "待填写"  # ← 填写订阅链接
    interval: 86400
    health-check: { enable: true, url: http://www.gstatic.com/generate_204, interval: 300 }

  danta:
    type: http
    path: ./proxy_providers/danta.yaml # 备用订阅源文件名, 推荐使用订阅商名
    url: "待填写"  # ← 填写订阅链接
    interval: 86400
    health-check: { enable: true, url: http://www.gstatic.com/generate_204, interval: 300 }

  # 如有更多机场，继续在此追加，格式同上 ↑

# ============================================================
# 2. 策略组 (Proxy Groups)
# ============================================================
proxy-groups:
  # 兼容 Surge 规则文件中的 PROXY 目标，桥接到 🚀节点选择
  - { name: Proxy, type: select, hidden: true, proxies: [🚀节点选择] }

  - name: 🚀节点选择  # 日常在面板里手动切换的主入口
    type: select
    proxies: [🇹🇼台湾组, 🇯🇵日本组, 🇰🇷韩国组, 🇺🇸美国组, 🇸🇬新加坡组, 🇭🇰香港组, 🌏其他地区, DIRECT]

  - name: 🇹🇼台湾组
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 100  # 延迟差超过 100ms 才切换，降低 IP 变动频率
    filter: "(?i)(🇹🇼|台湾|台灣|TW|Taiwan)"
    use: [dogess, danta]

  - name: 🇯🇵日本组
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
    filter: "(?i)(🇯🇵|日本|JP|Japan|东京|大阪)"
    use: [dogess, danta]

  - name: 🇰🇷韩国组
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
    filter: "(?i)(🇰🇷|韩国|KR|Korea|首尔)"
    use: [dogess, danta]

  - name: 🇺🇸美国组
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 200
    filter: "(?i)(🇺🇸|美国|United States|洛杉|纽约|西雅)"
    use: [dogess, danta]

  - name: 🇸🇬新加坡组
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
    filter: "(?i)(🇸🇬|新加坡|SG|Singapore|狮城)"
    use: [dogess, danta]

  - name: 🇭🇰香港组
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 100
    filter: "(?i)(🇭🇰|香港|HK|Hong Kong|HongKong)"
    use: [dogess, danta]

  # 不属于上述 6 个地区的所有节点
  - name: 🌏其他地区
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 400
    filter: "(?i)^(?!.*(🇹🇼|台湾|台灣|TW|Taiwan|🇯🇵|日本|JP|Japan|东京|大阪|🇰🇷|韩国|KR|Korea|首尔|🇺🇸|美国|United States|洛杉|纽约|西雅|🇸🇬|新加坡|SG|Singapore|狮城|🇭🇰|香港|HK|Hong Kong|HongKong)).*"
    use: [dogess, danta]

# ============================================================
# 3. 规则集 (Rule Providers)
# ============================================================
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}

rule-providers:
  smart-proxy:
    type: http
    behavior: classical
    format: text                 # Surge .conf 文本格式，Mihomo 以 classical 行为解析
    url: "https://raw.githubusercontent.com/julxxy/smart-proxy-rules/main/smart-proxy.conf"
    path: ./ruleset/smart-proxy.conf
    interval: 86400

  # 个人维护 - 威胁情报（诈骗、钓鱼、恶意软件等）
  reject-threat:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/julxxy/smart-proxy-rules/main/reject/reject-threat.conf"
    path: ./ruleset/reject-threat.conf
    interval: 86400

  # 实时恶意软件/钓鱼域名（abuse.ch URLhaus）
  reject-malware:
    type: http
    behavior: domain
    format: text
    url: "https://fastly.jsdelivr.net/gh/julxxy/smart-proxy-rules/reject/reject-urlhaus.txt"
    path: ./ruleset/reject-malware.yaml
    interval: 86400

  # 秋风广告规则 (AWAvenue Ads)
  reject-cn-ads-awavenue:
    type: http
    behavior: domain
    format: yaml
    url: "https://fastly.jsdelivr.net/gh/TG-Twilight/AWAvenue-Ads-Rule@main/Filters/AWAvenue-Ads-Rule-Clash.yaml"
    path: ./ruleset/reject-cn-ads-awavenue.yaml
    interval: 86400

  # anti-AD
  reject-cn-ads-antiad:
    type: http
    behavior: domain
    format: yaml
    url: "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml"
    path: ./ruleset/reject-cn-ads-antiad.yaml
    interval: 86400

  # 全球广告/追踪/隐私威胁（HaGeZi Pro，40万条）
  reject-hagezi-pro:
    type: http
    behavior: domain
    format: text
    url: "https://fastly.jsdelivr.net/gh/hagezi/dns-blocklists@latest/domains/pro.txt"
    path: ./ruleset/reject-hagezi-pro.yaml
    interval: 86400

  private:
    type: http
    behavior: domain
    format: yaml
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    path: ./ruleset/private.yaml
    interval: 86400

  copilot-proxy:
    type: http
    behavior: classical
    format: yaml
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Copilot/Copilot.yaml"
    path: ./ruleset/copilot-proxy.yaml
    interval: 86400

  google:
    type: http
    behavior: domain
    format: yaml
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/google.txt"
    path: ./ruleset/google.yaml
    interval: 86400

  microsoft-bing:
    type: http
    behavior: domain
    format: text                 # .list 文本格式
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/bing.list"
    path: ./ruleset/microsoft-bing.list
    interval: 86400

  gfw:
    type: http
    behavior: domain
    format: yaml
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt"
    path: ./ruleset/gfw.yaml
    interval: 86400

  tld-not-cn:
    type: http
    behavior: domain
    format: yaml
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/tld-not-cn.txt"
    path: ./ruleset/tld-not-cn.yaml
    interval: 86400

  telegramcidr:
    type: http
    behavior: ipcidr
    format: yaml
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt"
    path: ./ruleset/telegramcidr.yaml
    interval: 86400

  lancidr:
    type: http
    behavior: ipcidr
    format: yaml
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt"
    path: ./ruleset/lancidr.yaml
    interval: 86400

  tiktok: {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/tiktok.mrs"}

# ============================================================
# 4. 路由规则 (Rules)
# ============================================================
rules:
  - RULE-SET,reject-threat,REJECT                 # 个人维护 - 威胁情报（诈骗、钓鱼、恶意软件等）
  - RULE-SET,reject-malware,REJECT                # 实时恶意软件/钓鱼域名（abuse.ch URLhaus）
  - RULE-SET,reject-cn-ads-awavenue,REJECT        # 秋风广告规则 (AWAvenue Ads)
  - RULE-SET,reject-cn-ads-antiad,REJECT          # anti-AD (10万+）
  - RULE-SET,reject-hagezi-pro,REJECT             # 全球广告/追踪/隐私威胁（HaGeZi Pro，40万条）
  - RULE-SET,smart-proxy,Proxy                    # 自定义精确代理
  - RULE-SET,lancidr,DIRECT,no-resolve            # 局域网直连
  - RULE-SET,private,DIRECT                       # 私有地址直连
  - RULE-SET,copilot-proxy,Proxy                  # Microsoft Copilot
  - RULE-SET,google,Proxy
  - RULE-SET,microsoft-bing,Proxy
  - RULE-SET,telegramcidr,Proxy,no-resolve
  - RULE-SET,tiktok,Proxy                         # TikTok
  - RULE-SET,gfw,Proxy                            # 已知被墙域名
  - RULE-SET,tld-not-cn,Proxy                     # 非 .cn 顶级域名，兜底走代理
  - MATCH,DIRECT                                  # 其余流量直连（国内兜底）

# ============================================================
# Clash Meta for Android 配置
# 功能：多机场订阅整合 · 自动延迟优选 · 按需分流
# ============================================================

mode: rule

profile:
  store-selected: true # 重启后保持上次选择的节点

# ------------------------------------------------------------
# DNS
# ------------------------------------------------------------
dns:
  enable: true
  ipv6: false
  default-nameserver: [223.5.5.5, 119.29.29.29, 8.8.8.8]   # 用于解析 DoT/DoH 服务器域名，必须为直连 IP
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  respect-rules: true                                         # DNS 查询遵循代理规则，防止泄露
  proxy-server-nameserver: [223.5.5.5, 119.29.29.29]         # 解析代理服务器地址，走国内 DNS 降低握手延迟
  nameserver: [223.5.5.5, 119.29.29.29]                      # 国内域名解析
  fallback: ['https://doh.dns.sb/dns-query', 'https://dns.cloudflare.com/dns-query', 'https://dns.twnic.tw/dns-query', 'tls://8.8.4.4:853', tls://1.1.1.1, tls://8.8.8.8]  # 境外加密 DNS，用于被污染域名
  fallback-filter: {geoip: true, geoip-code: CN, geosite: [gfw], ipcidr: [240.0.0.0/4, 0.0.0.0/32], domain: [+.google.com, +.facebook.com, +.youtube.com]}
  fake-ip-filter: ["*.lan", "*.localdomain", "*.localhost", "*.local", "time.*.com", "time.*.gov", "ntp.*.com", "*.ntp.org.cn", "+.music.163.com", "+.126.net"]  # 这些域名返回真实 IP，不走 Fake-IP

# ------------------------------------------------------------
# 1. 机场订阅源
# ------------------------------------------------------------
proxy-providers:
  dogess:
    type: http
    path: ./proxy_providers/dogess.yaml
    url: "待填写"  # ← Dogess 订阅链接
    interval: 86400
    health-check: { enable: true, url: http://www.gstatic.com/generate_204, interval: 300 }

  danta:
    type: http
    path: ./proxy_providers/danta.yaml
    url: "待填写"  # ← 蛋挞订阅链接
    interval: 86400
    health-check: { enable: true, url: http://www.gstatic.com/generate_204, interval: 300 }

# ------------------------------------------------------------
# 2. 策略组
# ------------------------------------------------------------
proxy-groups:
  - name: Proxy   # ← 不显示在节点列表中，兼容 Surge 的 PROXY 的规则文件
    type: select
    hidden: true
    proxies: [🚀节点选择, DIRECT]

  - name: 🚀节点选择
    type: select
    proxies: [🇹🇼台湾组, 🇯🇵日本组, 🇰🇷韩国组, 🇺🇸美国组, 🇸🇬新加坡组, 🇭🇰香港组, 🌎余量, DIRECT]

  - name: 🇹🇼台湾组  # 主出口，IP 稳定性好，适合需要固定台湾 IP 的服务
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150  # 延迟差超过 150ms 才切换，降低 IP 变动频率
    filter: "(?i)(🇹🇼|台湾|台灣|TW|Taiwan)"
    use: [dogess, danta, qingyunti, paopaogou]

  - name: 🇯🇵日本组
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
    filter: "(?i)(🇯🇵|日本|JP|Japan|东京|大阪)"
    use: [dogess, danta, qingyunti, paopaogou]

  - name: 🇰🇷韩国组
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
    filter: "(?i)(🇰🇷|韩国|KR|Korea|首尔)"
    use: [dogess, danta, qingyunti, paopaogou]

  - name: 🇺🇸美国组
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 200
    filter: "(?i)(🇺🇸|美国|US|United States|洛杉|纽约|西雅)"
    use: [dogess, danta, qingyunti, paopaogou]

  - name: 🇸🇬新加坡组
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
    filter: "(?i)(🇸🇬|新加坡|SG|Singapore)"
    use: [dogess, danta, qingyunti, paopaogou]

  - name: 🇭🇰香港组
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 100
    filter: "(?i)(🇭🇰|香港|HK|Hong Kong|HongKong)"
    use: [dogess, danta, qingyunti, paopaogou]

  - name: 🌎余量     # 匹配所有不属于上述 6 个地区的节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 360
    filter: "(?i)^(?!.*(🇹🇼|台湾|台灣|TW|Taiwan|🇯🇵|日本|JP|Japan|东京|大阪|🇰🇷|韩国|KR|Korea|首尔|🇺🇸|美国|US|United States|洛杉|纽约|西雅|🇸🇬|新加坡|SG|Singapore🇭🇰|香港|HK|Hong Kong)).*"
    use: [dogess, danta, qingyunti, paopaogou]

# ------------------------------------------------------------
# 3. 规则集
# ------------------------------------------------------------
rule-providers:
  smart-proxy:  # 自维护的精确代理规则，优先级最高
    type: http
    behavior: classical
    format: yaml
    url: "https://raw.githubusercontent.com/julxxy/smart-proxy-rules/main/smart-proxy.yaml"
    path: ./ruleset/smart-proxy.yaml
    interval: 86400

  copilot-proxy:
    type: http
    behavior: classical
    format: yaml
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Copilot/Copilot.yaml"
    path: ./ruleset/copilot-proxy.yaml
    interval: 86400

  reject:
    type: http
    format: yaml
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400

  private:
    type: http
    format: yaml
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    path: ./ruleset/private.yaml
    interval: 86400

  google:
    type: http
    format: yaml
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/google.txt"
    path: ./ruleset/google.yaml
    interval: 86400

  microsoft-bing:
    type: http
    format: text
    behavior: domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/bing.list"
    path: ./ruleset/microsoft-bing.yaml
    interval: 86400

  gfw:
    type: http
    format: yaml
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt"
    path: ./ruleset/gfw.yaml
    interval: 86400

  tld-not-cn:
    type: http
    format: yaml
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/tld-not-cn.txt"
    path: ./ruleset/tld-not-cn.yaml
    interval: 86400

  telegramcidr:
    type: http
    format: yaml
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt"
    path: ./ruleset/telegramcidr.yaml
    interval: 86400

  lancidr:
    type: http
    format: yaml
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt"
    path: ./ruleset/lancidr.yaml
    interval: 86400

# ------------------------------------------------------------
# 4. 路由规则（优先级从高到低）
# ------------------------------------------------------------
rules:
  - RULE-SET,reject,REJECT                             # 广告/追踪拦截
  - RULE-SET,private,DIRECT                            # 私有地址直连
  - RULE-SET,lancidr,DIRECT,no-resolve                 # 局域网直连
  - RULE-SET,smart-proxy,🚀节点选择                     # 自定义精确代理
  - RULE-SET,copilot-proxy,🚀节点选择                   # Microsoft Copilot
  - RULE-SET,google,🚀节点选择
  - RULE-SET,microsoft-bing,🚀节点选择
  - RULE-SET,telegramcidr,🚀节点选择,no-resolve
  - RULE-SET,gfw,🚀节点选择                             # 已知被墙域名
  - RULE-SET,tld-not-cn,🚀节点选择                      # 非 .cn 顶级域名兜底代理
  - MATCH,DIRECT                                       # 其余全部直连（国内兜底）

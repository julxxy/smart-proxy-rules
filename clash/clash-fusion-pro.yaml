# ============================================================
# OpenClash 最小多机场融合配置
# 适用：OpenClash (Mihomo/Meta 内核) + TUN + Fake-IP
# 原则：DNS / 端口 / allow-lan / external-controller 由 OpenClash 界面管理，此处不写
# ============================================================

mode: rule

profile:
  store-selected: true

# ============================================================
# 机场订阅
# ============================================================
proxy-providers:
  dogess:
    type: http
    path: ./proxy_providers/dogess.yaml
    url: "待填写"
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

  danta:
    type: http
    path: ./proxy_providers/danta.yaml
    url: "待填写"
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

  qingyunti:
    type: http
    path: ./proxy_providers/qingyunti.yaml
    url: "待填写"
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

  paopaogou:
    type: http
    path: ./proxy_providers/paopaogou.yaml
    url: "待填写"
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# ============================================================
# 策略组（三层：手动总控 → 地区故转 → 节点自动）
# ============================================================
proxy-groups:
  - name: Proxy   # 兼容 Surge 规则文件中的 PROXY 目标，桥接到 🚀节点选择
    type: select
    hidden: true
    proxies: [🚀节点选择]

  - name: 🚀节点选择
    type: select
    proxies: [ 台湾-故转, 日本-故转, 新加坡-故转, 美国-故转, 🌏其他地区, ⚡️全局最优, DIRECT ]

  # 台湾
  - name: 台湾-故转
    type: fallback
    interval: 300
    lazy: false
    proxies: [台湾-手动, 台湾-自动]

  - name: 台湾-手动
    type: select
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇹🇼|台湾|台灣|TW|Taiwan)"

  - name: 台湾-自动
    type: url-test
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇹🇼|台湾|台灣|TW|Taiwan)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 100

  # 日本
  - name: 日本-故转
    type: fallback
    interval: 300
    lazy: false
    proxies: [日本-手动, 日本-自动]

  - name: 日本-手动
    type: select
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇯🇵|日本|JP|Japan|东京|大阪)"

  - name: 日本-自动
    type: url-test
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇯🇵|日本|JP|Japan|东京|大阪)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 100

  # 新加坡
  - name: 新加坡-故转
    type: fallback
    interval: 300
    lazy: false
    proxies: [新加坡-手动, 新加坡-自动]

  - name: 新加坡-手动
    type: select
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇸🇬|新加坡|SG|Singapore|狮城)"

  - name: 新加坡-自动
    type: url-test
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇸🇬|新加坡|SG|Singapore|狮城)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 100

  # 美国
  - name: 美国-故转
    type: fallback
    interval: 300
    lazy: false
    proxies: [美国-手动, 美国-自动]

  - name: 美国-手动
    type: select
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇺🇸|美国|US|United States|洛杉|纽约|西雅)"

  - name: 美国-自动
    type: url-test
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇺🇸|美国|US|United States|洛杉|纽约|西雅)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150

  # 不属于上述分组地区的所有节点兜底
  - name: 🌏其他地区
    type: url-test
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)^(?!.*(直连|拒绝|DIRECT|REJECT|🇹🇼|台湾|台灣|TW|Taiwan|🇯🇵|日本|JP|Japan|东京|大阪|🇺🇸|美国|US|United States|洛杉|纽约|西雅|🇸🇬|新加坡|SG|Singapore|狮城)).*"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 400

# ============================================================
# 规则集 (Rule Providers)
# ============================================================
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}

rule-providers:
  # 个人维护
  smart-proxy:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/julxxy/smart-proxy-rules/main/smart-proxy.conf"
    path: ./ruleset/smart-proxy.conf
    interval: 86400

  # Copilot
  copilot-proxy:
    type: http
    behavior: classical
    format: yaml
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Copilot/Copilot.yaml"
    path: ./ruleset/copilot-proxy.yaml
    interval: 86400

  # Microsoft Bing
  microsoft-bing:
    type: http
    behavior: domain
    format: text
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/bing.list"
    path: ./ruleset/microsoft-bing.yaml
    interval: 86400

  # 广告拦截（MRS）
  reject:
    type: http
    behavior: domain
    format: mrs
    url: "https://gh-proxy.com/github.com/metacubex/meta-rules-dat/raw/refs/heads/meta/geo/geosite/category-ads-all.mrs"
    path: ./ruleset/reject.yaml
    interval: 86400

  # GFW 名单（MRS，与 Loyalsoldier/gfw.txt 同源等价）
  gfw: {<<: *domain, url: "https://gh-proxy.com/github.com/metacubex/meta-rules-dat/raw/refs/heads/meta/geo/geosite/gfw.mrs"}

  # 私有/局域网域名（MRS）
  private: {<<: *domain, url: "https://gh-proxy.com/github.com/metacubex/meta-rules-dat/raw/refs/heads/meta/geo/geosite/private.mrs"}

  # 局域网 IP CIDR（MRS）
  lancidr: {<<: *ip, url: "https://gh-proxy.com/github.com/metacubex/meta-rules-dat/raw/refs/heads/meta/geo/geoip/private.mrs"}

  # 国内域名（MRS）
  china-domain: {<<: *domain, url: "https://gh-proxy.com/github.com/metacubex/meta-rules-dat/raw/refs/heads/meta/geo/geosite/cn.mrs"}

  # 国内 IP（MRS）
  china-ip: {<<: *ip, url: "https://gh-proxy.com/github.com/metacubex/meta-rules-dat/raw/refs/heads/meta/geo/geoip/cn.mrs"}

  # 非 .cn 顶级域名（宽泛代理兜底，MRS）
  tld-not-cn: {<<: *domain, url: "https://gh-proxy.com/github.com/metacubex/meta-rules-dat/raw/refs/heads/meta/geo/geosite/tld-not-cn.mrs"}

# ============================================================
# 路由规则
# ============================================================
rules:
  - RULE-SET,reject,REJECT                        # 广告拦截
  - RULE-SET,private,DIRECT                       # 私有地址
  - RULE-SET,lancidr,DIRECT,no-resolve            # 局域网
  - RULE-SET,china-domain,DIRECT                  # 国内域名
  - RULE-SET,china-ip,DIRECT,no-resolve           # 国内 IP
  - RULE-SET,smart-proxy,Proxy                    # 自定义精确代理
  - RULE-SET,copilot-proxy,Proxy                  # Copilot
  - RULE-SET,microsoft-bing,Proxy                 # Bing
  - RULE-SET,gfw,Proxy                            # 已知被墙域名
  - RULE-SET,tld-not-cn,Proxy                     # 非 .cn 顶级域名
  - MATCH,DIRECT                                  # 兜底直连

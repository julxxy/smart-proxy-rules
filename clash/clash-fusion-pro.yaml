# ============================================================
# OpenClash 最小多机场融合配置
# 适用：OpenClash (Mihomo/Meta 内核) + TUN + Fake-IP
# 原则：DNS / 端口 / allow-lan / external-controller 由 OpenClash 界面管理，此处不写
# ============================================================

mode: rule

profile:
  store-selected: true

# ============================================================
# 机场订阅
# ============================================================
proxy-providers:
  dogess:
    type: http
    path: ./proxy_providers/dogess.yaml
    url: "待填写"
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

  danta:
    type: http
    path: ./proxy_providers/danta.yaml
    url: "待填写"
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

  qingyunti:
    type: http
    path: ./proxy_providers/qingyunti.yaml
    url: "待填写"
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

  paopaogou:
    type: http
    path: ./proxy_providers/paopaogou.yaml
    url: "待填写"
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# ============================================================
# 策略组（三层：手动总控 → 地区故转 → 节点自动）
# ============================================================
proxy-groups:
  # 兼容 Surge 规则文件中的 PROXY 目标，桥接到 🚀节点选择
  - { name: Proxy, type: select, hidden: true, proxies: [🚀节点选择] }

  - name: 🚀节点选择
    type: select
    proxies: [台湾-故转, 日本-故转, 新加坡-故转, 美国-故转, 🌏其他地区, DIRECT]

  # 台湾
  - name: 台湾-故转
    type: fallback
    interval: 300
    lazy: false
    proxies: [台湾-手动, 台湾-自动]

  - name: 台湾-手动
    type: select
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇹🇼|台湾|台灣|TW|Taiwan)"

  - name: 台湾-自动
    type: url-test
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇹🇼|台湾|台灣|TW|Taiwan)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 100

  # 日本
  - name: 日本-故转
    type: fallback
    interval: 300
    lazy: false
    proxies: [日本-手动, 日本-自动]

  - name: 日本-手动
    type: select
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇯🇵|日本|JP|Japan|东京|大阪)"

  - name: 日本-自动
    type: url-test
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇯🇵|日本|JP|Japan|东京|大阪)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 100

  # 新加坡
  - name: 新加坡-故转
    type: fallback
    interval: 300
    lazy: false
    proxies: [新加坡-手动, 新加坡-自动]

  - name: 新加坡-手动
    type: select
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇸🇬|新加坡|SG|Singapore|狮城)"

  - name: 新加坡-自动
    type: url-test
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇸🇬|新加坡|SG|Singapore|狮城)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 100

  # 美国
  - name: 美国-故转
    type: fallback
    interval: 300
    lazy: false
    proxies: [美国-手动, 美国-自动]

  - name: 美国-手动
    type: select
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇺🇸|美国|US|United States|洛杉|纽约|西雅)"

  - name: 美国-自动
    type: url-test
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)(🇺🇸|美国|US|United States|洛杉|纽约|西雅)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150

  # 不属于上述分组地区的所有节点兜底
  - name: 🌏其他地区
    type: url-test
    use: [dogess, danta, qingyunti, paopaogou]
    filter: "(?i)^(?!.*(🇹🇼|台湾|台灣|TW|Taiwan|🇯🇵|日本|JP|Japan|东京|大阪|🇺🇸|美国|US|United States|洛杉|纽约|西雅|🇸🇬|新加坡|SG|Singapore|狮城)).*"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 400

# ============================================================
# 规则集 (Rule Providers)
# ============================================================
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}

rule-providers:
  # 个人维护
  smart-proxy:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/julxxy/smart-proxy-rules/main/smart-proxy.conf"
    path: ./ruleset/smart-proxy.conf
    interval: 86400

  # Copilot
  copilot-proxy:
    type: http
    behavior: classical
    format: yaml
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Copilot/Copilot.yaml"
    path: ./ruleset/copilot-proxy.yaml
    interval: 86400

  # Microsoft Bing
  microsoft-bing:
    type: http
    behavior: domain
    format: text                 # .list 文本格式
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/bing.list"
    path: ./ruleset/microsoft-bing.list
    interval: 86400

  telegramcidr:
    type: http
    behavior: ipcidr
    format: yaml
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt"
    path: ./ruleset/telegramcidr.yaml
    interval: 86400

  # 个人维护 - 威胁情报（诈骗、钓鱼、恶意软件等）
  reject-threat:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/julxxy/smart-proxy-rules/main/reject/reject-threat.conf"
    path: ./ruleset/reject-threat.conf
    interval: 86400

  # 实时恶意软件/钓鱼域名（abuse.ch URLhaus）
  reject-malware:
    type: http
    behavior: domain
    url: "https://fastly.jsdelivr.net/gh/julxxy/smart-proxy-rules/reject/reject-urlhaus.txt"
    path: ./ruleset/reject-malware.yaml
    interval: 86400

  # 全球广告/追踪/隐私威胁（HaGeZi Pro，40万条）
  reject-hagezi-pro:
    type: http
    behavior: domain
    url: "https://fastly.jsdelivr.net/gh/hagezi/dns-blocklists@latest/domains/pro.txt"
    path: ./ruleset/reject-hagezi-pro.yaml
    interval: 86400

  # 全球广告/追踪补充（1Hosts Lite，20万条）
  reject-1hosts-lite:
    type: http
    behavior: domain
    url: "https://badmojr.github.io/1Hosts/Lite/domains.txt"
    path: ./ruleset/reject-1hosts-lite.yaml
    interval: 86400

  # 中文互联网广告/追踪域名
  reject-cn-ads: {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs"}

  # TikTok（MRS）
  tiktok: {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/tiktok.mrs"}

  # GFW 名单（MRS，与 Loyalsoldier/gfw.txt 同源等价）
  gfw: {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/gfw.mrs"}

  # 私有/局域网域名（MRS）
  private: {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"}

  # 局域网 IP CIDR（MRS）
  lancidr: {<<: *ip, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"}

  # 国内域名（MRS）
  china-domain: {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"}

  # 国内 IP（MRS）
  china-ip: {<<: *ip, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"}

  # 非 .cn 顶级域名（MRS）
  tld-not-cn: {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/tld-!cn.mrs"}

# ============================================================
# 路由规则
# ============================================================
rules:
  - RULE-SET,reject-cn-ads,REJECT                 # 中文互联网广告/追踪域名（Loyalsoldier 维护）
  - RULE-SET,reject-threat,REJECT                 # 个人维护 - 威胁情报（诈骗、钓鱼、恶意软件等）
  - RULE-SET,reject-malware,REJECT                # 实时恶意软件/钓鱼域名（abuse.ch URLhaus）
  - RULE-SET,reject-hagezi-pro,REJECT             # 全球广告/追踪/隐私威胁（HaGeZi Pro，40万条）
  - RULE-SET,reject-1hosts-lite,REJECT            # 全球广告/追踪补充（1Hosts Lite，20万条）
  - RULE-SET,private,DIRECT                       # 私有地址
  - RULE-SET,smart-proxy,Proxy                    # 自定义代理优先级最高
  - RULE-SET,lancidr,DIRECT,no-resolve            # 局域网
  - RULE-SET,china-domain,DIRECT                  # 国内域名
  - RULE-SET,china-ip,DIRECT,no-resolve           # 国内 IP
  - RULE-SET,copilot-proxy,Proxy                  # Copilot
  - RULE-SET,microsoft-bing,Proxy                 # Bing
  - RULE-SET,tiktok,Proxy                         # TikTok
  - RULE-SET,telegramcidr,Proxy,no-resolve
  - RULE-SET,gfw,Proxy                            # 已知被墙域名
  - RULE-SET,tld-not-cn,Proxy                     # 非 .cn 顶级域名
  - MATCH,DIRECT                                  # 其余流量直连（国内兜底）

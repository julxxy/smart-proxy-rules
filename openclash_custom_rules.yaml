# ============================================================
# OpenClash/覆写设置/规则设置/自定义规则
# ============================================================
mixin:
  prepend-rules:
    - RULE-SET,reject,REJECT                          # 广告拦截
    - RULE-SET,private,DIRECT                         # 私有地址
    - RULE-SET,lancidr,DIRECT,no-resolve              # 局域网
    - RULE-SET,smart-proxy,PROXY                      # 自定义代理
    - RULE-SET,copilot-proxy,PROXY                    # Copilot
    - RULE-SET,google,PROXY                           # Google
    - RULE-SET,microsoft-bing,PROXY                   # Bing
    - RULE-SET,telegramcidr,PROXY,no-resolve          # Telegram IP
    - RULE-SET,gfw,PROXY                              # 已知被墙域名
    - RULE-SET,tld-not-cn,PROXY                       # 非 .cn 顶级域名
    - DOMAIN,tracking.miui.com,REJECT                 # MIUI 追踪
    - DOMAIN-SUFFIX,services.googleapis.cn,DIRECT     # Google CN 服务
    - DOMAIN-SUFFIX,xn--ngstr-lra8j.com,DIRECT        # Google Play CN
  rule-providers:
    smart-proxy:
      type: http
      behavior: classical
      format: yaml
      url: "https://raw.githubusercontent.com/julxxy/smart-proxy-rules/main/smart-proxy.conf"
      path: ./ruleset/smart-proxy.conf
      interval: 86400
    copilot-proxy:
      type: http
      behavior: classical
      format: yaml
      url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Copilot/Copilot.yaml"
      path: /etc/openclash/rule_provider/copilot-proxy.yaml
      interval: 86400
    reject:
      type: http
      behavior: domain
      url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
      path: ./ruleset/reject.yaml
      interval: 86400
    google:
      type: http
      behavior: domain
      url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/google.txt"
      path: ./ruleset/google.yaml
      interval: 86400
    microsoft-bing:
      type: http
      format: text
      behavior: domain
      url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/bing.list"
      path: ./ruleset/microsoft-bing.list
      interval: 86400
    private:
      type: http
      behavior: domain
      url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
      path: ./ruleset/private.yaml
      interval: 86400
    gfw:
      type: http
      behavior: domain
      url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt"
      path: ./ruleset/gfw.yaml
      interval: 86400
    tld-not-cn:
      type: http
      behavior: domain
      url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/tld-not-cn.txt"
      path: ./ruleset/tld-not-cn.yaml
      interval: 86400
    telegramcidr:
      type: http
      behavior: ipcidr
      url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt"
      path: ./ruleset/telegramcidr.yaml
      interval: 86400
    lancidr:
      type: http
      behavior: ipcidr
      url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt"
      path: ./ruleset/lancidr.yaml
      interval: 86400

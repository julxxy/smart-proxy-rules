# reject-mi-virus.conf
# 小米 MIUI 云控弹窗 + 隐私上报拦截
# 触发场景：安装 APK 弹出验证码弹窗、安全组件上报设备信息/APP列表
# 安全：不影响小米账号登录（account.xiaomi.com 未收录）
# 更新日期：2026-04-13
# ── 安装器验证弹窗（弹窗触发接口）──
DOMAIN,verify.sec.xiaomi.com,REJECT
DOMAIN,api.installer.xiaomi.com,REJECT
DOMAIN,static-verify.sec.xiaomi.com,REJECT
DOMAIN,cdn.cnbj1.fds.api.mi-img.com,REJECT
# ── 极验滑块验证码（弹窗本体）──
DOMAIN,api.geetest.com,REJECT
DOMAIN,static.geetest.com,REJECT
DOMAIN,api.geevisit.com,REJECT
# ── MIUI 安全组件云控上报 ──
DOMAIN,virus-engine.sec.miui.com,REJECT
DOMAIN,auth-engine.sec.miui.com,REJECT
